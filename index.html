        // ============================================================================
        // 🧠 GEMINI API INTEGRATION
        // ============================================================================
        const callGeminiLLM = async (newsText) => {
            const apiKey = ""; // API key is injected by the environment
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: `Analyze the following financial news headline and determine its immediate short-term market impact. Headline: "${newsText}"` }] }],
                systemInstruction: { 
                    parts: [{ text: "You are Jarvis, the quantitative trading AI of Capital Nerds. Act as an emotionless, data-driven financial engine. Analyze the provided news headline. Classify the market sentiment as exactly 'BULLISH', 'BEARISH', or 'NEUTRAL'. Provide a confidence score between 0 and 100. Provide a brief 1-2 sentence logical reasoning for your sentiment. Your output must strictly follow the JSON schema." }] 
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            sentiment: { type: "STRING", enum: ["BULLISH", "BEARISH", "NEUTRAL"] },
                            confidence: { type: "NUMBER" },
                            reasoning: { type: "STRING" }
                        },
                        required: ["sentiment", "confidence", "reasoning"]
                    }
                }
            };

            let delay = 1000;
            const maxRetries = 5;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (textResult) {
                        return JSON.parse(textResult);
                    }
                    throw new Error("Invalid response format");
                } catch (error) {
                    if (i === maxRetries - 1) {
                        console.error("Gemini API Error after retries:", error);
                        throw error;
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        };

        // 1. Fade Up Component
        const FadeInSection = ({ children, delay = 0, className = "" }) => {
          const [isVisible, setVisible] = useState(false);
          const domRef = useRef();

          useEffect(() => {
            const observer = new IntersectionObserver(
              (entries) => {
                entries.forEach((entry) => {
                  if (entry.isIntersecting) {
                    setVisible(true);
                    observer.unobserve(entry.target);
                  }
                });
              },
              { threshold: 0.15 }
            );
            if (domRef.current) observer.observe(domRef.current);
            return () => observer.disconnect();
          }, []);

          return (
            <div
              ref={domRef}
              className={`transition-all duration-1000 ease-out transform ${
                isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'
              } ${className}`}
              style={{ transitionDelay: `${delay}ms` }}
            >
              {children}
            </div>
          );
        };

        // 3. Number Counter Animation
        const NumberCounter = ({ end, decimals = 0, duration = 2000, prefix = "", suffix = "" }) => {
          const [count, useStateCount] = useState(0);
          const [isVisible, setVisible] = useState(false);
          const domRef = useRef();

          useEffect(() => {
            const observer = new IntersectionObserver(
              (entries) => {
                if (entries[0].isIntersecting) {
                  setVisible(true);
                  observer.disconnect();
                }
              },
              { threshold: 0.5 }
            );
            if (domRef.current) observer.observe(domRef.current);
            return () => observer.disconnect();
          }, []);

          useEffect(() => {
            if (!isVisible) return;
            let startTimestamp = null;
            const step = (timestamp) => {
              if (!startTimestamp) startTimestamp = timestamp;
              const progress = Math.min((timestamp - startTimestamp) / duration, 1);
              const easeProgress = 1 - Math.pow(1 - progress, 3);
              useStateCount(easeProgress * end);
              if (progress < 1) {
                window.requestAnimationFrame(step);
              } else {
                useStateCount(end);
              }
            };
            window.requestAnimationFrame(step);
          }, [isVisible, end, duration]);

          const displayValue = decimals > 0 ? count.toFixed(decimals) : Math.floor(count).toLocaleString();
          return <span ref={domRef}>{prefix}{displayValue}{suffix}</span>;
        };

        // 4. Monochrome Big Data Background
        const NetworkBackground = () => {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationFrameId;

            let w = window.innerWidth;
            let h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;

            const resize = () => {
              w = window.innerWidth;
              h = window.innerHeight;
              canvas.width = w;
              canvas.height = h;
            };
            window.addEventListener('resize', resize);

            class Particle {
              constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 2;
              }
              update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > w) this.vx = -this.vx;
                if (this.y < 0 || this.y > h) this.vy = -this.vy;
              }
              draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
              }
            }

            for (let i = 0; i < 100; i++) particles.push(new Particle());

            const animate = () => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i + 1; j < particles.length; j++) {
                  const dx = particles[i].x - particles[j].x;
                  const dy = particles[i].y - particles[j].y;
                  const distance = Math.sqrt(dx * dx + dy * dy);
                  if (distance < 150) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 - distance/500})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                  }
                }
              }
              animationFrameId = requestAnimationFrame(animate);
            };

            animate();
            return () => {
              window.removeEventListener('resize', resize);
              cancelAnimationFrame(animationFrameId);
            };
          }, []);

          return (
            <div className="absolute inset-0 z-0 pointer-events-none overflow-hidden">
              <canvas ref={canvasRef} className="absolute inset-0 w-full h-full opacity-40" />
            </div>
          );
        };

        // YOUTUBE AUTO CONVERTER HELPER
        const getEmbedUrl = (url) => {
          if (!url) return '';
          try {
            if (url.includes('youtube.com/embed/')) return url;
            let videoId = '';
            if (url.includes('youtube.com/watch')) {
              const urlObj = new URL(url);
              videoId = urlObj.searchParams.get('v');
            } else if (url.includes('youtu.be/')) {
              videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
            } else if (url.includes('youtube.com/shorts/')) {
              videoId = url.split('shorts/')[1].split(/[?#]/)[0];
            }
            if (videoId) {
              return `https://www.youtube.com/embed/${videoId}?rel=0`;
            }
          } catch (e) {

        const TypewriterTerminal = () => {
          const [lines, setLines] = useState([]);

            let isMounted = true;

            const script = [

            const processScript = async () => {

          return (
            <div className="relative rounded-2xl border border-gray-800/80 bg-[#080808] p-8 overflow-hidden shadow-[0_0_40px_rgba(34,197,94,0.03)] hover:border-gray-700 hover:shadow-[0_0_50px_rgba(34,197,94,0.06)] transition-all duration-500 min-h-[320px]">
              <div className="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-gray-500/50 to-transparent"></div>
              <div className="flex gap-2 mb-6">
                <div className="w-3 h-3 rounded-full bg-gray-800"></div>
                <div className="w-3 h-3 rounded-full bg-gray-800"></div>
                <div className="w-3 h-3 rounded-full bg-gray-800"></div>
